<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <title>Cadastro de Cursos</title>

</head>

<body>

    <h1>Cadastro de Cursos</h1>

    <hr>

    <h3>Pesquisar Curso</h3>

    <input
        type="text"
        id="busca"
        placeholder="Digite o nome do curso">

    <button onclick="pesquisarCurso()">

        Pesquisar

    </button>

    <button onclick="listarCursos()">

        Listar Todos

    </button>

    <hr>

    <h3>Cadastro</h3>

    <label>Nome</label>

    <br>

    <input
        type="text"
        id="nome">

    <br><br>

    <label>Carga Horária</label>

    <br>

    <input
        type="number"
        id="carga_horaria">

    <br><br>

    <label>Quantidade de Vagas</label>

    <br>

    <input
        type="number"
        id="vagas">

    <br><br>

    <label>Vagas Mínimas</label>

    <br>

    <input
        type="number"
        id="vagas_minimas">

    <br><br>

    <button onclick="cadastrarCurso()">

        Cadastrar

    </button>

    <hr>

    <h2>Cursos Cadastrados</h2>

    <table border="1" cellpadding="10">

        <thead>

            <tr>

                <th>ID</th>

                <th>Nome</th>

                <th>CH</th>

                <th>Vagas</th>

                <th>Mínimo</th>

                <th>Ações</th>

            </tr>

        </thead>

        <tbody id="tabelaCursos">

        </tbody>

    </table>

    <script src="script.js"></script>

</body>

</html>
